<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Расчет рейтинга автомобилей, сравнение моделей и аналитика цен на RatingAutos.">
    <meta name="keywords" content="Рейтинг авто, сравнение машин, расчет стоимости, автоаналитика">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyRating Autos PRO | Аналитика</title>
    <link rel="icon" href="https://fav.farm/🚗" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-content">
            <div class="logo-wrapper">
                <img src="logo.png" alt="MyRating.autos" class="logo-image">
            </div>
            <div class="header-actions">
                <button id="theme-toggle" onclick="toggleTheme()" class="theme-btn">
                    <img src="theme_light.png" id="theme-icon" alt="Тема">
                    <span>Тема</span>
                </button>
            </div>
        </div>
    </header>

    <div class="container">
        <main>
            <section class="dashboard">
                <div class="stat-card">
                    <span class="label">Средняя цена</span>
                    <div id="avg-price" class="value">$0</div>
                </div>
                <div class="stat-card">
                    <span class="label">Лидер рейтинга</span>
                    <div id="top-car" class="value">—</div>
                </div>
                <div class="stat-card">
                    <span class="label">Общая стоимость</span>
                    <div id="total-value" class="value">$0</div>
                </div>
            </section>

            <section class="add-form">
                <div class="form-grid">
                    <input type="text" id="car-name" placeholder="Марка и модель">
                    <input type="number" id="car-price" placeholder="Цена ($)">
                    <input type="number" id="car-year" placeholder="Год выпуска">
                    <input type="number" id="car-mileage" placeholder="Пробег (тыс. км)">
                    <select id="car-condition">
                        <option value="1.0">💎 Идеал (в родне)</option>
                        <option value="0.85">🎨 Косметика</option>
                        <option value="0.6">🔨 Бит/Крашен</option>
                        <option value="0.3">💀 Тотал</option>
                    </select>
                </div>
                <button onclick="calculateAndAdd()" class="btn-main">Просчитать и добавить в список</button>
            </section>

            <section class="controls">
                <input type="text" id="search-input" placeholder="Поиск в гараже..." oninput="filterCars()">
                <div class="stats-counter" id="stats-count">Авто в списке: 0</div>
                <div class="sort-buttons">
                    <button class="btn-main btn-small" onclick="sortCars('rating')">По рейтингу</button>
                    <button class="btn-main btn-small" onclick="sortCars('price')">По цене</button>
                </div>
            </section>

            <div id="car-list" class="grid-layout"></div>

            <div id="empty-state" class="empty-box" style="display: none;">
                <div class="empty-icon">🏎️</div>
                <h2>Гараж пуст</h2>
                <button class="btn-main" onclick="restoreDefaults()">Восстановить базу</button>
            </div>

            <section class="promo-banner">
                <div class="promo-content">
                    <div class="promo-text">
                        <h3>🔍 Проверка истории по VIN</h3>
                        <p>ДТП, пробеги и залоги в одном отчете.</p>
                    </div>
                    <a href="https://autoteka.ru/" target="_blank" class="btn-main btn-small vin-btn">Проверить в Автотеке</a>
                </div>
            </section>
        </main>
        
        <footer class="main-footer">
            <button class="btn-main btn-danger" onclick="clearAll()">Очистить базу данных</button>
        </footer>
    </div>

    <div id="compare-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Сравнение моделей</h2>
                <button class="close-btn" onclick="closeCompare()">&times;</button>
            </div>
            <div id="compare-table-container"></div>
        </div>
    </div>

    <div id="compare-float-bar" class="compare-bar">
        <span id="compare-text">Выбрано: 0</span>
        <div class="bar-buttons">
            <button class="btn-main btn-small" onclick="openCompare()">Сравнить</button>
            <button class="btn-main btn-small btn-danger" onclick="resetCompare()">Сброс</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyRating.Autos — Умный расчет стоимости и состояния авто</title>
    
    <meta property="og:title" content="MyRating.Autos">
    <meta property="og:description" content="Умный алгоритм оценки автомобилей. Узнай реальный балл машины перед покупкой!">
    <meta property="og:image" content="og_preview.png">
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">MyR<span>⭐</span>ting</div>
    </header>

    <main class="container">
        <section class="calculator-card">
            <h2>Параметры автомобиля</h2>
            

<div class="input-group full-width">
    <label>Выберите модель для быстрой настройки</label>
    <select id="db-selector" class="main-input" onchange="suggestMarketPrice(this.value)">
        <option value="">-- Выберите из списка 20 популярных --</option>
        </select>
</div>


            <div class="input-grid">
                <div class="input-group">
                    <label>Год выпуска</label>
                    <input type="number" id="car-year" placeholder="2020" class="main-input">
                </div>
                <div class="input-group">
                    <label>Пробег (км)</label>
                    <input type="number" id="car-mileage" placeholder="50000" class="main-input">
                </div>
                <div class="input-group">
                    <label>Владельцев по ПТС</label>
                    <input type="number" id="car-owners" placeholder="1" class="main-input">
                </div>
                <div class="input-group">
                    <label>Кол-во ДТП</label>
                    <input type="number" id="car-accidents" placeholder="0" class="main-input">
                </div>
                <div class="input-group">
                    <label>Регион эксплуатации</label>
                    <select id="region-type" class="main-input">
                        <option value="normal">Юг / Сухой климат</option>
                        <option value="salt" selected>Мегаполис (Мск, СПб)</option>
                        <option value="harsh">Север / Тяжелые условия</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Цена продавца</label>
                    <input type="number" id="car-price" placeholder="Цена в рублях" class="main-input">
                </div>
                <div class="input-group full-width">
                    <label>Средняя цена этой модели на рынке</label>
                    <input type="number" id="market-price" placeholder="Для сравнения адекватности" class="main-input">
                </div>
            </div>

            <button onclick="calculate()" class="btn-primary">Рассчитать рейтинг</button>
        </section>

        <section id="result-section" class="result-card hidden">
            <div class="score-container">
                <span id="final-score">0.0</span>
                <p>итоговый балл</p>
            </div>
            <div id="warning-list" class="warning-box"></div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <div class="footer-info">
                <h3>🚀 Проект в развитии</h3>
                <p>База постоянно пополняется. Находимся в стадии активной разработки.</p>
            </div>
            <div class="footer-actions">
                <button onclick="addToBookmarks()" class="btn-secondary">⭐ В закладки</button>
                <a href="mailto:info@myrating.autos" class="btn-secondary">✉️ Обратная связь</a>
            </div>
            <div class="footer-contact">
                <p>По вопросам сотрудничества: <a href="https://t.me/myrating_autos" class="contact-link">Написать в Telegram</a></p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>

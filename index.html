<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyRating.autos | Сравнение авто</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="light-theme">

    <header class="main-header">
        <div class="header-content">
            <div class="logo-wrapper">
                <img src="logo.png" alt="MyRating.autos" class="logo-image">
            </div>
            <button id="theme-toggle" class="theme-btn">
                <img src="theme_light.png" id="theme-icon" alt="Тема">
                <span>Тема</span>
            </button>
        </div>
    </header>

    <main class="container">
        <section class="dashboard">
            <div class="stat-card">
                <span class="label">Средняя цена</span>
                <div id="avg-price" class="value">$0</div>
            </div>
            <div class="stat-card">
                <span class="label">Лидер рейтинга</span>
                <div id="top-car" class="value">—</div>
            </div>
            <div class="stat-card">
                <span class="label">Общая стоимость</span>
                <div id="total-value" class="value">$0</div>
            </div>
        </section>

        <section class="add-form">
            <div class="form-grid">
                <input type="text" id="car-name" placeholder="Марка и модель">
                <input type="number" id="car-price" placeholder="Цена ($)">
                <input type="number" id="car-year" placeholder="Год выпуска">
                <input type="number" id="car-mileage" placeholder="Пробег (тыс. км)">
                <select id="car-condition">
                    <option value="1.0">💎 Идеал</option>
                    <option value="0.85">🎨 Косметика</option>
                    <option value="0.6">🔨 Бит/Крашен</option>
                    <option value="0.3">💀 Тотал</option>
                </select>
                <select id="car-region">
                    <option value="eu">🇪🇺 Европа</option>
                    <option value="usa">🇺🇸 США</option>
                    <option value="asia">🌏 Азия</option>
                    <option value="ru">🇷🇺 СНГ</option>
                </select>
            </div>
            <button id="add-car-btn" class="btn-main">Добавить в список</button>
        </section>

        <nav class="region-filters" id="region-filters">
            <button class="filter-btn active" data-region="all">🌐 Весь мир</button>
            <button class="filter-btn" data-region="usa">🇺🇸 США</button>
            <button class="filter-btn" data-region="eu">🇪🇺 Европа</button>
            <button class="filter-btn" data-region="asia">🌏 Азия</button>
            <button class="filter-btn" data-region="ru">🇷🇺 СНГ</button>
        </nav>

        <div class="controls">
            <input type="text" id="search-input" placeholder="Поиск в гараже...">
            <div id="stats-count" class="stats-counter">Авто в списке: 0</div>
        </div>

        <div id="car-list" class="grid-layout"></div>
        <div id="empty-state" class="empty-box" style="display: none;">
            <div class="empty-icon">📁</div>
            <h2>Гараж пуст</h2>
            <button id="restore-btn" class="btn-main">Восстановить базу</button>
        </div>
    </main>

    <footer class="site-footer">
        <button id="clear-db-btn" class="btn-main btn-danger" onclick="AppState.clearAll()">Очистить базу</button>
        <div class="footer-content">
            <div class="share-buttons">
                <a href="#" id="share-tg" class="btn-share tg">Telegram</a>
                <button id="copy-link-btn" class="btn-share copy">🔗 Ссылка</button>
            </div>
        </div>
    </footer>

    <div id="compare-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Сравнение</h2>
                <button id="close-modal-btn" class="close-btn">&times;</button>
            </div>
            <div id="compare-table-container"></div>
        </div>
    </div>

    <div id="compare-float-bar" class="compare-bar">
        <span id="compare-text">Выбрано: 0</span>
        <div class="bar-buttons">
            <button id="open-compare-btn" class="btn-main btn-small">Сравнить</button>
            <button id="reset-compare-btn" class="btn-main btn-small btn-danger">Сброс</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
